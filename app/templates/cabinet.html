{% extends 'base.html' %}
{% block title %}나의 재료 보관함 - COCKTAIL FINDER{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='cabinet.css') }}">
{% endblock %}

{% block content %}
        <!-- 페이지 제목 -->
        <section class="cabinet-header">
            <h2>🗄️ 나의 재료 보관함</h2>
            <p class="cabinet-desc">소지 중인 재료를 선택하세요. 선택한 재료로 만들 수 있는 칵테일을 찾을 수 있습니다.</p>
            <div class="cabinet-summary">
                선택된 재료: <span id="selectedCount">0</span>개
            </div>
        </section>

        <!-- 로딩 상태 -->
        <div id="loadingState" class="loading-state">재료 목록을 불러오는 중...</div>

        <!-- 재료 목록 -->
        <div id="ingredientList" class="ingredient-list" style="display:none;"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='cabinet.js') }}"></script>
{% endblock %}
