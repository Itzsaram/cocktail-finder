{% extends 'base.html' %}
{% block title %}신고 관리 - COCKTAIL FINDER{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin_reports.css') }}">
{% endblock %}

{% block content %}
        <h2 class="page-title">🚨 신고 관리</h2>

        <!-- 탭 -->
        <div class="report-tabs">
            <button class="rtab-btn active" id="tabPending"   onclick="switchReportTab('pending')">
                미처리 신고 <span class="rtab-badge" id="pendingBadge"></span>
            </button>
            <button class="rtab-btn" id="tabResolved" onclick="switchReportTab('resolved')">
                처리된 신고
            </button>
        </div>

        <!-- 미처리 신고 패널 -->
        <div id="panelPending" class="rpanel active">
            <div id="pendingList" class="report-table-wrap">
                <div class="loading-state">불러오는 중...</div>
            </div>
        </div>

        <!-- 처리된 신고 패널 -->
        <div id="panelResolved" class="rpanel" style="display:none">
            <div id="resolvedList" class="report-table-wrap">
                <div class="loading-state">불러오는 중...</div>
            </div>
        </div>

        <!-- ── 처리 모달 ──────────────────────────────────── -->
        <div class="modal-overlay" id="resolveModal" onclick="closeResolveModalOutside(event)">
            <div class="modal-box">
                <div class="modal-header">
                    <h3 class="modal-title">⚖️ 신고 처리</h3>
                    <button class="modal-close" onclick="closeResolveModal()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="resolve-info" id="resolveInfo"></div>
                    <div class="form-group">
                        <label>처리 방식 <span class="required">*</span></label>
                        <select id="resolveAction">
                            <option value="">처리 방식을 선택하세요</option>
                            <option value="dismissed">허위 신고 처리 (콘텐츠 유지)</option>
                            <option value="content_modified">콘텐츠 수정</option>
                            <option value="content_deleted">콘텐츠 삭제</option>
                            <option value="user_sanctioned">사용자 제재 (로그인 차단)</option>
                        </select>
                    </div>
                    <div class="error-message" id="resolveError"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-modal-cancel" onclick="closeResolveModal()">취소</button>
                    <button class="btn-modal-submit" onclick="submitResolve()">처리 완료</button>
                </div>
            </div>
        </div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='admin_reports.js') }}"></script>
{% endblock %}
