<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>회원가입 - COCKTAIL FINDER</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1 class="logo">🍸 COCKTAIL FINDER</h1>
                <p class="auth-subtitle">회원가입</p>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="userId">사용자 ID</label>
                    <input type="text" id="userId" name="userId"
                           placeholder="사용자 ID를 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="userName">닉네임</label>
                    <input type="text" id="userName" name="userName"
                           placeholder="닉네임을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email"
                           placeholder="이메일을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password"
                           placeholder="비밀번호를 입력하세요 (최소 6자)" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">비밀번호 확인</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           placeholder="비밀번호를 다시 입력하세요" required>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn-submit">회원가입</button>
            </form>

            <div class="auth-footer">
                <p>이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a></p>
                <p><a href="{{ url_for('index') }}">← 홈으로 돌아가기</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='utils.js') }}"></script>
    <script src="{{ url_for('static', filename='signup.js') }}"></script>
</body>
</html>
