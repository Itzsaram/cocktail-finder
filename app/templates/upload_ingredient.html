{% extends 'base.html' %}
{% block title %}재료 업로드 - COCKTAIL FINDER{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='upload_ingredient.css') }}">
{% endblock %}

{% block content %}
        <!-- 페이지 제목 -->
        <section class="upload-header">
            <h2>🧪 재료 업로드</h2>
            <p class="upload-desc">새로운 재료를 데이터베이스에 추가합니다.</p>
        </section>

        <!-- 업로드 폼 -->
        <section class="upload-section">
            <form id="uploadForm" class="upload-form">

                <div class="form-group">
                    <label for="ingredientName">재료명 <span class="required">*</span></label>
                    <input type="text" id="ingredientName" placeholder="재료명을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label for="categorySelect">카테고리 <span class="required">*</span></label>
                    <select id="categorySelect" required>
                        <option value="">카테고리 선택...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="unitSelect">단위 <span class="required">*</span></label>
                    <select id="unitSelect" required>
                        <option value="ml">ml (밀리리터)</option>
                        <option value="oz">oz (온스)</option>
                        <option value="dash">dash (대시)</option>
                        <option value="tsp">tsp (티스푼)</option>
                        <option value="개">개</option>
                        <option value="잎">잎</option>
                        <option value="꼬집">꼬집</option>
                        <option value="g">g (그램)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">설명</label>
                    <textarea id="description" placeholder="재료에 대한 설명을 입력하세요 (선택)" rows="3"></textarea>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn-submit">재료 추가</button>
            </form>
        </section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='utils.js') }}"></script>
<script src="{{ url_for('static', filename='upload_ingredient.js') }}"></script>
{% endblock %}
